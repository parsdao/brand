<svg viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Pars Network Square OpenGraph Image (800x800)
    For Instagram, Discord, etc.
  -->
  <defs>
    <linearGradient id="sq-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d06f"/>
      <stop offset="50%" stop-color="#caa24a"/>
      <stop offset="100%" stop-color="#f3dc8f"/>
    </linearGradient>
    <linearGradient id="sq-blue" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#003355"/>
      <stop offset="50%" stop-color="#00abff"/>
      <stop offset="100%" stop-color="#66d0ff"/>
    </linearGradient>
    <radialGradient id="sq-bg" cx="50%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#001a2e"/>
      <stop offset="60%" stop-color="#05060a"/>
      <stop offset="100%" stop-color="#020308"/>
    </radialGradient>
    <filter id="sq-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#sq-bg)"/>

  <!-- Decorative stars -->
  <g opacity="0.12">
    <g transform="translate(80, 80) scale(0.2)">
      <path d="M0,-100 L30,-60 L100,-40 L60,0 L100,40 L30,60 L0,100 L-30,60 L-100,40 L-60,0 L-100,-40 L-30,-60 Z" fill="none" stroke="url(#sq-gold)" stroke-width="4"/>
    </g>
    <g transform="translate(720, 720) scale(0.2) rotate(22)">
      <path d="M0,-100 L30,-60 L100,-40 L60,0 L100,40 L30,60 L0,100 L-30,60 L-100,40 L-60,0 L-100,-40 L-30,-60 Z" fill="none" stroke="url(#sq-gold)" stroke-width="4"/>
    </g>
    <g transform="translate(720, 80) scale(0.15) rotate(-15)">
      <path d="M0,-100 L30,-60 L100,-40 L60,0 L100,40 L30,60 L0,100 L-30,60 L-100,40 L-60,0 L-100,-40 L-30,-60 Z" fill="none" stroke="url(#sq-gold)" stroke-width="4"/>
    </g>
    <g transform="translate(80, 720) scale(0.15) rotate(10)">
      <path d="M0,-100 L30,-60 L100,-40 L60,0 L100,40 L30,60 L0,100 L-30,60 L-100,40 L-60,0 L-100,-40 L-30,-60 Z" fill="none" stroke="url(#sq-gold)" stroke-width="4"/>
    </g>
  </g>

  <!-- Main Logo (larger) -->
  <g transform="translate(400, 330) scale(2)">
    <g filter="url(#sq-glow)">
      <path
        d="M0,-100 L30,-60 L100,-40 L60,0 L100,40 L30,60 L0,100 L-30,60 L-100,40 L-60,0 L-100,-40 L-30,-60 Z"
        fill="none"
        stroke="url(#sq-gold)"
        stroke-width="4"
        stroke-linejoin="round"
      />
    </g>
    <path
      d="M0,-70 L22,-42 L70,-28 L42,0 L70,28 L22,42 L0,70 L-22,42 L-70,28 L-42,0 L-70,-28 L-22,-42 Z"
      fill="url(#sq-blue)"
      stroke="url(#sq-gold)"
      stroke-width="3"
      stroke-linejoin="round"
    />
    <path
      d="M0,-45 L14,-27 L45,-18 L27,0 L45,18 L14,27 L0,45 L-14,27 L-45,18 L-27,0 L-45,-18 L-14,-27 Z"
      fill="none"
      stroke="url(#sq-gold)"
      stroke-width="2"
      stroke-linejoin="round"
      opacity="0.8"
    />
    <g fill="none" stroke="#eaf7ff" stroke-width="1.5" opacity="0.6">
      <circle r="55"/>
      <circle r="35"/>
    </g>
    <circle r="8" fill="url(#sq-gold)"/>
    <path
      d="M0,-20 L6,-6 L20,0 L6,6 L0,20 L-6,6 L-20,0 L-6,-6 Z"
      fill="#002a47"
      stroke="url(#sq-gold)"
      stroke-width="1.5"
      stroke-linejoin="round"
    />
  </g>

  <!-- Wordmark -->
  <text
    x="400"
    y="620"
    text-anchor="middle"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="56"
    font-weight="700"
    letter-spacing="0.08em"
    fill="url(#sq-gold)"
  >PARS NETWORK</text>

  <!-- Tagline -->
  <text
    x="400"
    y="680"
    text-anchor="middle"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="24"
    font-weight="300"
    fill="rgba(255,255,255,0.5)"
  >Persian Sovereignty</text>
</svg>
