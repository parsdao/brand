<svg viewBox="0 0 400 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Pars Network Wordmark
    Clean, modern typography with Persian-inspired gold gradient
  -->
  <defs>
    <linearGradient id="gold-text" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d06f"/>
      <stop offset="50%" stop-color="#caa24a"/>
      <stop offset="100%" stop-color="#f3dc8f"/>
    </linearGradient>
  </defs>

  <text
    x="0"
    y="45"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="48"
    font-weight="700"
    letter-spacing="0.05em"
    fill="url(#gold-text)"
  >PARS</text>

  <text
    x="165"
    y="45"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="48"
    font-weight="300"
    letter-spacing="0.05em"
    fill="white"
  >NETWORK</text>
</svg>
