<svg viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Pars Network OpenGraph Image (1200x630)
    For Twitter, Facebook, LinkedIn social sharing
  -->
  <defs>
    <linearGradient id="og-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d06f"/>
      <stop offset="50%" stop-color="#caa24a"/>
      <stop offset="100%" stop-color="#f3dc8f"/>
    </linearGradient>
    <linearGradient id="og-blue" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#003355"/>
      <stop offset="50%" stop-color="#00abff"/>
      <stop offset="100%" stop-color="#66d0ff"/>
    </linearGradient>
    <radialGradient id="og-bg" cx="50%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#001a2e"/>
      <stop offset="60%" stop-color="#05060a"/>
      <stop offset="100%" stop-color="#020308"/>
    </radialGradient>
    <filter id="og-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- Decorative stars (background) -->
  <g opacity="0.15">
    <g transform="translate(100, 100) scale(0.3)">
      <path d="M0,-100 L30,-60 L100,-40 L60,0 L100,40 L30,60 L0,100 L-30,60 L-100,40 L-60,0 L-100,-40 L-30,-60 Z" fill="none" stroke="url(#og-gold)" stroke-width="4"/>
    </g>
    <g transform="translate(1100, 530) scale(0.25) rotate(22)">
      <path d="M0,-100 L30,-60 L100,-40 L60,0 L100,40 L30,60 L0,100 L-30,60 L-100,40 L-60,0 L-100,-40 L-30,-60 Z" fill="none" stroke="url(#og-gold)" stroke-width="4"/>
    </g>
    <g transform="translate(1050, 100) scale(0.2) rotate(-15)">
      <path d="M0,-100 L30,-60 L100,-40 L60,0 L100,40 L30,60 L0,100 L-30,60 L-100,40 L-60,0 L-100,-40 L-30,-60 Z" fill="none" stroke="url(#og-gold)" stroke-width="4"/>
    </g>
    <g transform="translate(150, 500) scale(0.2) rotate(10)">
      <path d="M0,-100 L30,-60 L100,-40 L60,0 L100,40 L30,60 L0,100 L-30,60 L-100,40 L-60,0 L-100,-40 L-30,-60 Z" fill="none" stroke="url(#og-gold)" stroke-width="4"/>
    </g>
  </g>

  <!-- Main Logo -->
  <g transform="translate(600, 250) scale(1.2)">
    <g filter="url(#og-glow)">
      <path
        d="M0,-100 L30,-60 L100,-40 L60,0 L100,40 L30,60 L0,100 L-30,60 L-100,40 L-60,0 L-100,-40 L-30,-60 Z"
        fill="none"
        stroke="url(#og-gold)"
        stroke-width="4"
        stroke-linejoin="round"
      />
    </g>
    <path
      d="M0,-70 L22,-42 L70,-28 L42,0 L70,28 L22,42 L0,70 L-22,42 L-70,28 L-42,0 L-70,-28 L-22,-42 Z"
      fill="url(#og-blue)"
      stroke="url(#og-gold)"
      stroke-width="3"
      stroke-linejoin="round"
    />
    <path
      d="M0,-45 L14,-27 L45,-18 L27,0 L45,18 L14,27 L0,45 L-14,27 L-45,18 L-27,0 L-45,-18 L-14,-27 Z"
      fill="none"
      stroke="url(#og-gold)"
      stroke-width="2"
      stroke-linejoin="round"
      opacity="0.8"
    />
    <g fill="none" stroke="#eaf7ff" stroke-width="1.5" opacity="0.6">
      <circle r="55"/>
      <circle r="35"/>
    </g>
    <circle r="8" fill="url(#og-gold)"/>
    <path
      d="M0,-20 L6,-6 L20,0 L6,6 L0,20 L-6,6 L-20,0 L-6,-6 Z"
      fill="#002a47"
      stroke="url(#og-gold)"
      stroke-width="1.5"
      stroke-linejoin="round"
    />
  </g>

  <!-- Wordmark -->
  <text
    x="600"
    y="460"
    text-anchor="middle"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="72"
    font-weight="700"
    letter-spacing="0.1em"
    fill="url(#og-gold)"
  >PARS NETWORK</text>

  <!-- Tagline -->
  <text
    x="600"
    y="520"
    text-anchor="middle"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="28"
    font-weight="300"
    fill="rgba(255,255,255,0.6)"
  >Persian Sovereignty</text>

  <!-- URL -->
  <text
    x="600"
    y="600"
    text-anchor="middle"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="20"
    font-weight="400"
    fill="rgba(255,255,255,0.4)"
  >pars.network</text>
</svg>
